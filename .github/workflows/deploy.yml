name: Render Quarto & Deploy to Netlify
on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install system deps for Quarto
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install Quarto CLI
        run: |
          wget https://github.com/quarto-dev/quarto-cli/releases/latest/download/quarto-linux-amd64.deb -O quarto.deb
          sudo dpkg -i quarto.deb || sudo apt --fix-broken install -y
          quarto --version

      - name: Install R packages (tidyverse etc.)
        run: |
          Rscript -e "install.packages(c('remotes','tidyverse'), repos='https://cran.rstudio.com')"

      - name: Render Quarto site
        run: |
          quarto render

      - name: Set up Node (required by netlify-cli)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.SITE_ID }}
        run: |
          netlify deploy --dir=_site --prod --site=$NETLIFY_SITE_ID
